services:
  db:
    image: mongo:latest
    container_name: rental_db
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - rental-net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  car-service:
    build: 
      context: ./car-service
      dockerfile: Dockerfile
    container_name: car_service_app
    restart: on-failure
    ports:
      - "8000:8000"
    environment:
      - MONGO_URL=mongodb://db:27017
    depends_on:
      db:
        condition: service_started
    networks:
      - rental-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  rental-service:
    build: 
      context: ./rental-service
      dockerfile: Dockerfile
    container_name: rental_service_app
    restart: on-failure
    ports:
      - "8001:8000"
    environment:
      - MONGO_URL=mongodb://db:27017
    depends_on:
      db:
        condition: service_started
      car-service:
        condition: service_started
    networks:
      - rental-net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: frontend_app
    ports:
      - "80:80"
    depends_on:
      - car-service
      - rental-service
    networks:
      - rental-net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

networks:
  rental-net:
    driver: bridge

volumes:
  mongo_data: