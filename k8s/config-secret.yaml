apiVersion: v1
kind: ConfigMap
metadata:
  name: rental-config
  namespace: car-rental-ns
data:
  # Zamiast 'db:27017' z docker-compose, w k8s strzelamy po nazwie Service: 'mongodb-service'
  MONGO_URL: "mongodb://mongodb-service:27017"
---
apiVersion: v1
kind: Secret
metadata:
  name: rental-secret
  namespace: car-rental-ns
type: Opaque
data:
  # Przykładowy zabezpieczony klucz (zakodowany w base64 dla 'super-secret-key')
  APP_SECRET_KEY: c3VwZXItc2VjcmV0LWtleQ==