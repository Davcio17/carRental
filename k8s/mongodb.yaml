apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: car-rental-ns
spec:
  serviceName: "mongodb-service"
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
        - name: mongo
          image: mongo:latest
          ports:
            - containerPort: 27017
          volumeMounts:
            - name: mongo-storage
              mountPath: /data/db
          resources: # Punkt 2a: Ograniczenie zasobów
            limits:
              cpu: "500m"
              memory: 512Mi
            requests:
              cpu: "250m"
              memory: 256Mi
      volumes:
        - name: mongo-storage
          persistentVolumeClaim:
            claimName: mongodb-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb-service
  namespace: car-rental-ns
spec:
  type: ClusterIP # Dostęp tylko wewnątrz klastra (bezpieczeństwo!)
  ports:
    - port: 27017
      targetPort: 27017
  selector:
    app: mongodb