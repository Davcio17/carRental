apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: car-rental-ingress
  namespace: car-rental-ns
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$1
spec:
  ingressClassName: nginx
  rules:
    - host: car-rental.local
      http:
        paths:
          - path: /api/cars/?(.*)     
            pathType: ImplementationSpecific
            backend:
              service:
                name: car-service-service
                port:
                  number: 8000
          - path: /api/rentals/?(.*)   
            pathType: ImplementationSpecific
            backend:
              service:
                name: rental-service-service
                port:
                  number: 8000
          - path: /(.*)                
            pathType: ImplementationSpecific
            backend:
              service:
                name: frontend-service
                port:
                  number: 80